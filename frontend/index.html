<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星界神话 - 谐波共振星座</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: 'Microsoft YaHei', sans-serif;
      }
      #gameCanvas {
        display: block;
        cursor: crosshair;
      }
      #ui-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        color: #fff;
      }
      .hud {
        position: absolute;
        padding: 16px 24px;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(100, 150, 255, 0.3);
        border-radius: 12px;
        font-size: 14px;
      }
      #level-info {
        top: 20px;
        left: 20px;
      }
      #hint-box {
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        max-width: 600px;
      }
      #hint-box .title {
        font-size: 18px;
        font-weight: bold;
        color: #a0c4ff;
        margin-bottom: 8px;
      }
      #progress-bar {
        top: 20px;
        right: 20px;
        min-width: 180px;
      }
      .progress-bar-container {
        width: 100%;
        height: 8px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        margin-top: 8px;
        overflow: hidden;
      }
      .progress-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #667eea, #764ba2);
        border-radius: 4px;
        transition: width 0.5s ease;
      }
      .btn {
        pointer-events: auto;
        padding: 10px 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.3s;
        margin: 0 5px;
      }
      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
      }
      .btn.classroom-active {
        background: linear-gradient(135deg, #00ff88 0%, #00b4d8 100%);
        box-shadow: 0 0 25px rgba(0, 255, 136, 0.5);
      }
      .btn.classroom-clear {
        background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
      }

      #harmonic-panel {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%) translateY(-150%);
        width: min(680px, 90vw);
        max-height: 80vh;
        overflow-y: auto;
        background: rgba(8, 12, 35, 0.96);
        backdrop-filter: blur(16px);
        border: 2px solid rgba(0, 255, 180, 0.4);
        border-radius: 20px;
        padding: 24px 28px;
        pointer-events: auto;
        transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6),
                    0 0 40px rgba(0, 255, 180, 0.15);
        z-index: 100;
      }
      #harmonic-panel.show {
        transform: translateX(-50%) translateY(0);
      }
      #harmonic-panel::-webkit-scrollbar {
        width: 6px;
      }
      #harmonic-panel::-webkit-scrollbar-thumb {
        background: rgba(0, 255, 180, 0.3);
        border-radius: 3px;
      }

      .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
        padding-bottom: 14px;
        border-bottom: 1px solid rgba(0, 255, 180, 0.2);
      }
      .panel-title {
        font-size: 22px;
        font-weight: bold;
        background: linear-gradient(135deg, #00ffb4, #00b4d8, #a855f7);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .panel-close {
        pointer-events: auto;
        background: rgba(255, 100, 100, 0.2);
        color: #ff8888;
        border: 1px solid rgba(255, 100, 100, 0.3);
        border-radius: 50%;
        width: 32px;
        height: 32px;
        cursor: pointer;
        font-size: 16px;
        transition: all 0.2s;
      }
      .panel-close:hover {
        background: rgba(255, 100, 100, 0.4);
        transform: rotate(90deg);
      }

      .selection-row {
        display: flex;
        gap: 12px;
        margin-bottom: 18px;
      }
      .star-slot {
        flex: 1;
        padding: 14px;
        border-radius: 12px;
        border: 2px dashed rgba(255, 255, 255, 0.2);
        text-align: center;
        background: rgba(255, 255, 255, 0.03);
        min-height: 80px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        transition: all 0.3s;
      }
      .star-slot.filled-1 {
        border-color: rgba(0, 255, 180, 0.6);
        background: rgba(0, 255, 180, 0.08);
        border-style: solid;
      }
      .star-slot.filled-2 {
        border-color: rgba(255, 120, 220, 0.6);
        background: rgba(255, 120, 220, 0.08);
        border-style: solid;
      }
      .slot-label {
        font-size: 12px;
        opacity: 0.6;
        margin-bottom: 6px;
      }
      .slot-name {
        font-size: 16px;
        font-weight: bold;
        color: #fff;
      }
      .slot-freq {
        font-size: 13px;
        margin-top: 4px;
        font-family: monospace;
        opacity: 0.85;
      }

      .ratio-display {
        text-align: center;
        padding: 18px;
        border-radius: 14px;
        margin-bottom: 16px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .ratio-title {
        font-size: 14px;
        opacity: 0.7;
        margin-bottom: 8px;
      }
      .ratio-numbers {
        font-size: 48px;
        font-weight: 900;
        font-family: 'Georgia', serif;
        letter-spacing: 4px;
        margin: 6px 0;
      }
      .ratio-numbers.harmonic {
        background: linear-gradient(135deg, #00ffb4, #00b4d8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .ratio-numbers.warn {
        background: linear-gradient(135deg, #ffbe3c, #ff8c42);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .ratio-numbers.disharmonic {
        color: #ff6b6b;
      }
      .ratio-status {
        font-size: 13px;
        margin-top: 6px;
        padding: 4px 12px;
        border-radius: 20px;
        display: inline-block;
      }
      .ratio-status.yes {
        background: rgba(0, 255, 136, 0.15);
        color: #00ff88;
      }
      .ratio-status.warn {
        background: rgba(255, 190, 60, 0.18);
        color: #ffbe3c;
      }
      .ratio-status.no {
        background: rgba(255, 100, 100, 0.15);
        color: #ff8888;
      }

      .explanation-section {
        margin-top: 16px;
      }
      .explain-card {
        padding: 14px 16px;
        border-radius: 10px;
        margin-bottom: 12px;
        border-left: 4px solid;
        background: rgba(255, 255, 255, 0.03);
        line-height: 1.7;
      }
      .explain-card.result {
        border-color: #00ff88;
        font-size: 15px;
        font-weight: 600;
        white-space: pre-line;
      }
      .explain-card.result.warn {
        border-color: #ffbe3c;
      }
      .explain-card.result.fail {
        border-color: #ff6b6b;
      }
      .explain-card.math {
        border-color: #00b4d8;
        font-family: 'Consolas', monospace;
        font-size: 13px;
        white-space: pre-line;
      }
      .explain-card.fact {
        border-color: #a855f7;
        font-size: 13.5px;
        white-space: pre-line;
      }
      .explain-card.visual {
        border-color: #fbbf24;
        font-size: 13.5px;
      }
      .explain-title {
        font-size: 11px;
        letter-spacing: 1px;
        opacity: 0.6;
        text-transform: uppercase;
        margin-bottom: 6px;
        font-weight: bold;
      }

      .panel-tip {
        text-align: center;
        font-size: 12.5px;
        opacity: 0.55;
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid rgba(255,255,255,0.08);
      }
      #complete-modal {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0);
        background: rgba(10, 15, 40, 0.95);
        border: 2px solid rgba(160, 196, 255, 0.5);
        border-radius: 20px;
        padding: 40px 60px;
        text-align: center;
        pointer-events: auto;
        transition: transform 0.5s ease;
      }
      #complete-modal.show {
        transform: translate(-50%, -50%) scale(1);
      }
      #complete-modal h2 {
        font-size: 32px;
        color: #ffd700;
        margin-bottom: 16px;
        text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
      }
      #complete-modal p {
        font-size: 16px;
        color: #a0c4ff;
        margin-bottom: 24px;
        line-height: 1.6;
      }
      #buttons-container {
        position: absolute;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer">
      <div class="hud" id="level-info">
        <div>第 <span id="level-num">1</span> 关</div>
        <div style="margin-top: 6px; color: #a0c4ff;">神话生物: <span id="creature-name">未知</span></div>
        <div style="margin-top: 6px; font-size: 12px; color: #888;">已连接: <span id="connected-count">0</span> / <span id="total-count">0</span></div>
      </div>
      <div class="hud" id="progress-bar">
        <div>星座完成度</div>
        <div class="progress-bar-container">
          <div class="progress-bar-fill" id="progress-fill" style="width: 0%"></div>
        </div>
      </div>
      <div class="hud" id="hint-box">
        <div class="title" id="hint-title">观察星空</div>
        <div id="hint-text">寻找闪烁频率成倍数关系的恒星，用鼠标拖动连接它们</div>
      </div>
      <div id="buttons-container">
        <button class="btn" id="btn-undo">撤销连线</button>
        <button class="btn" id="btn-reset">重置本关</button>
        <button class="btn" id="btn-hint">显示频率</button>
        <button class="btn" id="btn-classroom">🎓 谐波课堂</button>
        <button class="btn classroom-clear" id="btn-classroom-clear" style="display:none;">清除选择</button>
      </div>
      <div id="harmonic-panel">
        <div class="panel-header">
          <div class="panel-title">🎓 谐波课堂 · 频率分析</div>
          <button class="panel-close" id="btn-panel-close">×</button>
        </div>
        <div class="selection-row">
          <div class="star-slot" id="slot-1">
            <div class="slot-label">① 第一颗星</div>
            <div class="slot-name" id="slot1-name">点击星点选择...</div>
            <div class="slot-freq" id="slot1-freq"></div>
          </div>
          <div class="star-slot" id="slot-2">
            <div class="slot-label">② 第二颗星</div>
            <div class="slot-name" id="slot2-name">点击星点选择...</div>
            <div class="slot-freq" id="slot2-freq"></div>
          </div>
        </div>
        <div class="ratio-display">
          <div class="ratio-title" id="ratio-title">等待选择两颗星</div>
          <div class="ratio-numbers" id="ratio-numbers">? : ?</div>
          <div class="ratio-status" id="ratio-status" style="display:none;"></div>
        </div>
        <div class="explanation-section" id="explain-section" style="display:none;">
          <div class="explain-card result" id="card-result"></div>
          <div class="explain-card math">
            <div class="explain-title">📐 数学分析</div>
            <div id="card-math"></div>
          </div>
          <div class="explain-card fact">
            <div class="explain-title">🎵 音乐趣闻</div>
            <div id="card-fact"></div>
          </div>
          <div class="explain-card visual">
            <div class="explain-title">👀 观察提示</div>
            <div id="card-visual"></div>
          </div>
        </div>
        <div class="panel-tip" id="panel-tip">
          💡 在星空中点击两颗主星，分析它们的频率关系
        </div>
      </div>
      <div id="complete-modal">
        <h2 id="modal-title">✨ 星座完成 ✨</h2>
        <p id="modal-desc"></p>
        <button class="btn" id="btn-next">下一关</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
